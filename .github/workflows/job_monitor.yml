name: Job Page Monitor

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: job-monitor-6h
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout the repo ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Setup Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # ── 3. Cache pip dependencies ──────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      # Cache HuggingFace model downloads (sentence-transformers)
      - name: Cache HuggingFace
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # Defensive install so browser setup never fails if requirements drift.
          python -m pip install playwright

      # ── 4.1 Install Playwright Chromium for JS-heavy career pages ─────
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      # ── 5. Decode base64 Google credentials (if set) ───────────────────
      - name: Decode Google credentials
        if: ${{ env.GOOGLE_CREDENTIALS_JSON != '' }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" | base64 -d > credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # ── 6. Run the monitor script ──────────────────────────────────────
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # JSearch is disabled by default to avoid noisy irrelevant results.
          ENABLE_JSEARCH_API: "false"
          JSEARCH_FAIL_FAST_ON_429: "true"
          JSEARCH_RATE_LIMIT_RETRIES: "1"
          JSEARCH_RATE_LIMIT_COOLDOWN_SECONDS: "900"
          JSEARCH_ASYNC_CONCURRENCY: "1"
          URL_CHANGE_ALERT_MAX_EVENTS: "20"
          URL_CHANGE_MAX_EVENTS_PER_CYCLE: "200"
          URL_CHANGE_MAX_OPENINGS_PER_EVENT: "50"
          URL_CHANGE_MAX_OPENINGS_PER_CYCLE: "500"
          URL_CHANGE_LOG_BASELINE_OPENINGS: "true"
          RECORD_URL_CHANGES_TO_SHEETS: "true"
          RECORD_SEARCH_ACTIVITY_TO_SHEETS: "true"
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Enable local semantic filter (sentence-transformers, free + local).
          ENABLE_SEMANTIC_FILTER: "true"
          SEMANTIC_MODEL_NAME: "sentence-transformers/all-MiniLM-L6-v2"
          # Tighten enrichment workload for free-tier runtime.
          JOB_DETAILS_MAX_PER_CYCLE: "20"
          JOB_DESCRIPTION_MIN_CHARS: "120"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python monitor.py

      # ── 7. Cleanup credentials ─────────────────────────────────────────
      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
